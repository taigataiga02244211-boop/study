<!DOCTYPE html>
<html>
<!-- 内部のプログラム -->
<head>
    <!-- スマホ用の画面に設定 -->
    <meta name = "viewport" content = "width=device-width, initial-scale = 1">

    <title>勉強✎時間管理サイト</title>

    <link href = "https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel = "stylesheet" href = "style.css">
</head>

<!-- タイマーカード -->
<body>
<input id = "username" placeholder = "名前">
<button onclick = "saveName()">保存</button>

<div class = "container text-center mt-5">
    <div class = "card p-4 shadow">
    <h1> 勉強✎時間管理サイト</h1>
    <h2 id = "timer" >00:00:00</h2>
    <input id = "startContent" class = "form-control my-3" placeholder = "勉強内容">
    <button id="startButton" class="btn btn-primary m-2" onclick="toggleTimer()">START</button>

    <p id = "result"></p>
    </div>

</div>   

<!-- p-3 小 p-4 標準 p-5 大 -->
<!-- 合計時間カード -->
<div class = "card total-card p-3 mt-3 shadow">
    <h4 id = "total">合計時間：00:00:00</h4>
    <p id = "history"></p>
</div>

<!-- ランキングカード -->
 <div class = "card ranking-card p-3 mt-3 shadow">
    <h4>合計勉強時間ランキング👑</h4>
    <p id = "ranking">記録なし</p>
 </div>

<script src = "script.js"></script>

</body>
</html>
